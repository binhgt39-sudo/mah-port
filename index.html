<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dealer's Fan - Keyboard Navigation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --deck-back: #260000;
            --gold-dirty: #a3843b;
            --blood-red: #7a0000;
            --ash-white: #cccccc;
            --font-main: 'Special Elite', cursive;
            --font-title: 'Playfair Display', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-dark);
            color: var(--ash-white);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background-image: radial-gradient(circle, #2a0303 0%, #050505 80%);
        }

        header {
            text-align: center;
            padding: 30px 20px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-family: var(--font-title);
            font-size: 2.5rem;
            color: var(--blood-red);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--blood-red);
        }

        .subtitle {
            font-size: 1rem;
            color: var(--gold-dirty);
            margin-top: 5px;
        }

        /* MẶT HỀ KỊCH TRUNG TÂM */
        .center-mask {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .mask-icon {
            font-size: 6.5rem;
            filter: drop-shadow(0 0 15px rgba(122, 0, 0, 0.8));
            line-height: 1;
            animation: float 4s ease-in-out infinite;
        }

        .mask-text {
            font-family: var(--font-title);
            color: var(--blood-red);
            font-size: 1.2rem;
            letter-spacing: 3px;
            margin-top: 10px;
            text-shadow: 2px 2px 4px #000;
        }

        /* KHUNG CHỨA BỘ BÀI */
        .card-fan-container {
            position: fixed;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 240px;
            z-index: 5;
        }

        .playing-card {
            position: absolute;
            width: 160px;
            height: 240px;
            left: 0;
            top: 0;
            transform-origin: center 100%;
            perspective: 1000px;
            cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), z-index 0.1s, opacity 0.5s;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d;
            box-shadow: -3px 3px 12px rgba(0,0,0,0.8);
            border-radius: 8px;
        }

        /* HIỆU ỨNG HOVER CHUỘT HOẶC CHỌN BẰNG PHÍM (KEYBOARD KEY) */
        body:not(.card-focused) .playing-card:hover,
        body:not(.card-focused) .playing-card.keyboard-selected {
            z-index: 100 !important;
            transform: var(--base-transform) translateY(-40px) scale(1.15) !important;
        }

        /* Đánh dấu đường viền đỏ rực khi dùng phím chọn trúng */
        body:not(.card-focused) .playing-card.keyboard-selected .card-inner {
            border: 2px solid red;
            box-shadow: 0 0 20px var(--blood-red);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 8px;
            padding: 12px;
            border: 3px solid var(--gold-dirty);
        }

        /* Mặt sau */
        .card-back {
            background-color: var(--deck-back);
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                              url('https://www.transparenttextures.com/patterns/dark-wood.png');
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--gold-dirty);
            font-size: 2rem;
        }

        /* Mặt trước */
        .card-front {
            background-color: #ede9df;
            background-image: url('https://www.transparenttextures.com/patterns/cardboard-flat.png');
            color: #111111;
