<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dealer's Fan - Absolute Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --deck-back: #260000;
            --gold-dirty: #a3843b;
            --blood-red: #7a0000;
            --ash-white: #cccccc;
            --font-main: 'Special Elite', cursive;
            --font-title: 'Playfair Display', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-dark);
            color: var(--ash-white);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background-image: radial-gradient(circle, #2a0303 0%, #050505 80%);
        }

        header {
            text-align: center;
            padding: 30px 20px;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
            transition: opacity 0.4s;
        }

        h1 {
            font-family: var(--font-title);
            font-size: 2.3rem;
            color: var(--blood-red);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--blood-red);
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--gold-dirty);
            margin-top: 5px;
        }

        /* 🎯 SÂN KHẤU TRUNG TÂM TUYỆT ĐỐI (GIỮ CỐ ĐỊNH MẶT HỀ & BÀI) */
        .stage-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;  /* Đủ rộng để bao quát cả vùng xòe bài */
            height: 600px; /* Đủ cao để chứa cả mặt hề lẫn bộ bài */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        /* MẶT HỀ KỊCH TRUNG TÂM */
        .center-mask {
            text-align: center;
            pointer-events: none;
            transition: opacity 0.4s;
            margin-bottom: 20px; /* Tạo khoảng cách an toàn với bộ bài */
        }

        .mask-icon {
            font-size: 6.5rem;
            filter: drop-shadow(0 0 15px rgba(122, 0, 0, 0.8));
            line-height: 1;
            animation: float 4s ease-in-out infinite;
        }

        .mask-text {
            font-family: var(--font-title);
            color: var(--blood-red);
            font-size: 1.2rem;
            letter-spacing: 3px;
            margin-top: 10px;
            text-shadow: 2px 2px 4px #000;
        }

        /* KHUNG CHỨA NAN QUẠT (TÂM XOAY ĐƯỢC GHÌ CHẶT TẠI ĐÂY) */
        .card-fan-container {
            position: relative;
            width: 160px;
            height: 240px;
            /* Khóa chết tâm điểm ở giữa sân khấu, không lo bị đẩy ra rìa màn hình */
        }

        .playing-card {
            position: absolute;
            width: 160px;
            height: 240px;
            left: 0;
            top: 0;
            transform-origin: center center; /* Thay đổi thành center để trình duyệt luôn tính được tọa độ */
            perspective: 1000px;
            cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), z-index 0.1s, opacity 0.4s;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d;
            box-shadow: -3px 3px 12px rgba(0,0,0,0.8);
            border-radius: 8px;
        }

        /* HIỆU ỨNG HOVER CHUỘT HOẶC CHỌN BẰNG PHÍM */
        body:not(.card-focused) .playing-card:hover,
        body:not(.card-focused) .playing-card.keyboard-selected {
            z-index: 100 !important;
            /* Khi chọn, lá bài sẽ phóng to và trồi lên theo hướng nghiêng của chính nó */
            transform: var(--base-transform) scale(1.2) translateY(-30px) !important;
        }

        body:not(.card-focused) .playing-card.keyboard-selected .card-inner {
            border: 2px solid red;
            box-shadow: 0 0 20px var(--blood-red);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 8px;
            padding: 12px;
            border: 3px solid var(--gold-dirty);
        }

        /* Mặt sau */
        .card-back {
            background-color: var(--deck-back);
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                              url('https://www.transparenttextures.com/patterns/dark-wood.png');
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--gold-dirty);
            font-size: 2rem;
        }

        /* Mặt trước */
        .card-front {
            background-color: #ede9df;
            background-image: url('https://www.transparenttextures.com/patterns/cardboard-flat.png');
            color: #111111;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-suit-top { text-align: left; font-size: 1.1rem; font-weight: bold; line-height: 1;}
        .card-suit-bottom { text-align: right; font-size: 1.1rem; font-weight: bold; transform: rotate(180deg); line-height: 1;}

        .card-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .card-content h3 { font-family: var(--font-title); font-size: 0.95rem; margin-bottom: 3px; text-transform: uppercase;}
        .card-content p { font-size: 0.65rem; color: #333; margin-bottom: 8px; line-height: 1.2; }

        .btn-card {
            font-size: 0.6rem;
            padding: 4px 8px;
            background: #111;
            color: #fff;
            text-decoration: none;
            border: 1px solid var(--blood-red);
            text-transform: uppercase;
        }
        .btn-card:hover { background: var(--blood-red); }

        .suit-red { color: var(--blood-red); }
        .suit-black { color: #111111; }

        /* TRẠNG THÁI CINEMATIC FOCUS */
        body.card-focused header,
        body.card-focused .center-mask,
        body.card-focused .playing-card:not(.active) {
            opacity: 0;
            pointer-events: none;
        }

        .playing-card.active {
            z-index: 999 !important;
            /* Đưa quân bài về thẳng tâm tuyệt đối dựa theo tọa độ vùng stage trung tâm */
            transform: translate(0, -60px) scale(1.8) rotate(0deg) !important;
        }

        .playing-card.active .card-inner {
            transform: rotateY(180deg);
            box-shadow: 0 15px 40px rgba(122, 0, 0, 0.5);
            border: 3px solid var(--gold-dirty) !important;
        }

        /* Nút cất bài */
        .close-overlay {
            position: fixed;
            top: 25px;
            right: 25px;
            background: transparent;
            color: var(--blood-red);
            border: 2px solid var(--blood-red);
            padding: 8px 16px;
            font-family: var(--font-main);
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        body.card-focused .close-overlay {
            opacity: 1;
            pointer-events: auto;
        }
        body.card-focused .close-overlay:hover {
            background: var(--blood-red);
            color: white;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        footer {
            position: absolute;
            bottom: 0;
            width: 100vw;
            text-align: center;
            padding: 10px;
            font-size: 0.7rem;
            color: #333;
            z-index: 1;
        }
        footer a { color: var(--gold-dirty); text-decoration: none; margin: 0 10px;}
    </style>
</head>
<body>

    <button class="close-overlay" id="btnClose">Cất Bài (Esc)</button>

    <header>
        <h1>THE DEALER'S DECK</h1>
        <p class="subtitle">Dùng phím mũi tên [←] [→] để duyệt bài, [Enter] để rút bài</p>
    </header>

    <div class="stage-center">
        
        <div class="center-mask">
            <div class="mask-icon">🎭</div>
            <div class="mask-text">DEALER</div>
        </div>

        <div class="card-fan-container" id="cardFan"></div>

    </div>

    <footer>
        <p>© 2026 The Dealer's Choice. <a href="#">GitHub</a> | <a href="#">LinkedIn</a></p>
    </footer>
