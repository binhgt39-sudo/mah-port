<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dealer's Fan - Buckshot Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --deck-back: #260000;
            --gold-dirty: #a3843b;
            --blood-red: #7a0000;
            --ash-white: #cccccc;
            --font-main: 'Special Elite', cursive;
            --font-title: 'Playfair Display', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-dark);
            color: var(--ash-white);
            overflow-x: hidden;
            min-height: 100vh;
            background-image: radial-gradient(circle, #1f0202 0%, #050505 80%);
        }

        header {
            text-align: center;
            padding: 40px 20px 20px 20px;
        }

        h1 {
            font-family: var(--font-title);
            font-size: 3rem;
            color: var(--blood-red);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--blood-red);
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--gold-dirty);
            margin-top: 5px;
        }

        /* KHU VỰC SÒNG BÀI CHÍNH */
        .table-container {
            position: relative;
            width: 100%;
            height: 750px; /* Đủ khoảng trống cho bài xòe */
            margin-top: 50px;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Căn bài từ dưới lên để xòe vòng cung */
        }

        /* MẶT HỀ KỊCH TRUNG TÂM */
        .center-mask {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            pointer-events: none; /* Không che mất tương tác của bài */
        }

        .mask-icon {
            font-size: 9rem;
            color: var(--gold-dirty);
            filter: drop-shadow(0 0 15px rgba(122, 0, 0, 0.8));
            line-height: 1;
            animation: float 4s ease-in-out infinite;
        }

        .mask-text {
            font-family: var(--font-title);
            color: var(--blood-red);
            font-size: 1.5rem;
            letter-spacing: 3px;
            margin-top: 10px;
            text-shadow: 2px 2px 4px #000;
        }

        /* HỆ THỐNG NAN QUẠT (CARD FAN) */
        .card-fan {
            position: relative;
            width: 200px;
            height: 320px;
            margin-bottom: 50px; /* Neo tâm xoay ở phía dưới */
        }

        .playing-card {
            position: absolute;
            width: 200px;
            height: 300px;
            left: 0;
            top: 0;
            transform-origin: center 120%; /* Điểm neo xoay nằm dưới đáy lá bài */
            perspective: 1000px;
            cursor: pointer;
            transition: z-index 0s, transform 0.3s ease;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s;
            transform-style: preserve-3d;
            box-shadow: -5px 5px 15px rgba(0,0,0,0.7);
            border-radius: 8px;
        }

        /* KHI HOVER: Lá bài dựng thẳng dậy, phóng to và nổi lên trên cùng */
        .playing-card:hover {
            z-index: 100 !important;
            transform: rotate(0deg) translate(0, -60px) scale(1.2) !important;
        }

        .playing-card:hover .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 8px;
            padding: 15px;
            border: 3px solid var(--gold-dirty);
        }
