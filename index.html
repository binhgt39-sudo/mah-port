<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dealer's Fan - Buckshot Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --deck-back: #260000;
            --gold-dirty: #a3843b;
            --blood-red: #7a0000;
            --ash-white: #cccccc;
            --font-main: 'Special Elite', cursive;
            --font-title: 'Playfair Display', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-dark);
            color: var(--ash-white);
            overflow: hidden; /* Chống cuộn trang lung tung */
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-image: radial-gradient(circle, #2a0303 0%, #050505 80%);
        }

        header {
            text-align: center;
            padding: 20px;
            z-index: 20;
        }

        h1 {
            font-family: var(--font-title);
            font-size: 2.5rem;
            color: var(--blood-red);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--blood-red);
        }

        .subtitle {
            font-size: 1rem;
            color: var(--gold-dirty);
            margin-top: 5px;
        }

        /* KHU VỰC SÒNG BÀI CHÍNH - ÉP VÀO GIỮA MÀN HÌNH */
        .table-container {
            position: relative;
            width: 100%;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center; /* Đảm bảo luôn ở giữa */
        }

        /* MẶT HỀ KỊCH TRUNG TÂM */
        .center-mask {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            text-align: center;
            pointer-events: none;
        }

        .mask-icon {
            font-size: 7rem;
            color: var(--gold-dirty);
            filter: drop-shadow(0 0 15px rgba(122, 0, 0, 0.8));
            line-height: 1;
            animation: float 4s ease-in-out infinite;
        }

        .mask-text {
            font-family: var(--font-title);
            color: var(--blood-red);
            font-size: 1.2rem;
            letter-spacing: 3px;
            margin-top: 5px;
            text-shadow: 2px 2px 4px #000;
        }

        /* HỆ THỐNG NAN QUẠT (CARD FAN) */
        .card-fan {
            position: relative;
            width: 180px;
            height: 270px;
            margin-top: 150px; /* Đẩy tâm xoay xuống dưới mặt hề một chút */
        }

        .playing-card {
            position: absolute;
            width: 180px;
            height: 270px;
            left: 0;
            top: 0;
            transform-origin: center 110%; /* Tâm xoay nằm dưới đáy lá bài */
            perspective: 1000px;
            cursor: pointer;
            transition: z-index 0s, transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d;
            box-shadow: -5px 5px 15px rgba(0,0,0,0.7);
            border-radius: 8px;
        }

        /* KHI HOVER: Lá bài dựng thẳng, nhảy lên trên, lật mặt */
        .playing-card:hover {
